name: NASA Capture

# Captura GOES-East IR C13 (NASA Worldview) → S3 → Lambda YOLO (via screenshots/*.jpg)
on:
  schedule:
    # A cada 15 min (UTC) — todas as regiões operacionais do Brasil.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      upload_cv_jpg:
        description: "Enviar JPG em screenshots/ (dispara pipeline CV na Lambda)"
        type: boolean
        default: true
      data:
        description: "Data específica YYYY-MM-DD (vazio = hoje UTC)"
        required: false
        default: ""
      region_set:
        description: "Conjunto de regiões (brasil-operacional, brasil-norte, brasil-centro, brasil-sul, america-sul, all)"
        required: false
        default: "brasil-operacional"
      regions:
        description: "Lista CSV de regiões específicas (sobrescreve region_set)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

concurrency:
  group: nasa-capture
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  S3_BUCKET_IMAGES: ${{ vars.S3_BUCKET_IMAGES || 'satellite-images-gs2' }}
  NASA_S3_PREFIX: nasa-satellite
  NASA_CV_S3_PREFIX: screenshots

jobs:
  capture:
    name: NASA Worldview → S3
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Capture NASA Worldview → S3
        id: capture
        run: |
          set -euo pipefail
          UPLOAD_CV="${{ github.event_name == 'schedule' && 'true' || github.event.inputs.upload_cv_jpg }}"
          DATA="${{ github.event.inputs.data }}"
          REGION_SET="${{ github.event_name == 'schedule' && 'brasil-operacional' || github.event.inputs.region_set }}"
          REGIONS="${{ github.event.inputs.regions }}"
          ARGS=""
          if [ "$UPLOAD_CV" != "true" ]; then
            ARGS="$ARGS --no-cv-jpg"
          fi
          if [ -n "$DATA" ]; then
            ARGS="$ARGS --data $DATA"
          fi
          if [ -n "$REGIONS" ]; then
            ARGS="$ARGS --regions $REGIONS"
          elif [ -n "$REGION_SET" ]; then
            ARGS="$ARGS --region-set $REGION_SET"
          fi
          echo "Executando: python scripts/capture_nasa_to_s3.py $ARGS"
          python scripts/capture_nasa_to_s3.py $ARGS | tee nasa-capture.log
          PNG_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          text = Path("nasa-capture.log").read_text(encoding="utf-8")
          start = text.rfind("{")
          payload = json.loads(text[start:])
          print(payload.get("capturas_ok", 0))
          PY
          )
          JPG_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          text = Path("nasa-capture.log").read_text(encoding="utf-8")
          start = text.rfind("{")
          payload = json.loads(text[start:])
          print(len(payload.get("cv_jpg_s3_keys", [])))
          PY
          )
          echo "recent_png_count=$PNG_COUNT" >> "$GITHUB_OUTPUT"
          echo "recent_jpg_count=$JPG_COUNT" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          echo "## NASA Capture" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bucket: \`${{ env.S3_BUCKET_IMAGES }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PNG prefix: \`${{ env.NASA_S3_PREFIX }}/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CV trigger: \`${{ env.NASA_CV_S3_PREFIX }}/*.jpg\` → Lambda \`gs2-api\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region set: \`${{ github.event_name == 'schedule' && 'brasil-operacional' || github.event.inputs.region_set }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PNGs enviados para a galeria: **${{ steps.capture.outputs.recent_png_count }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- JPGs enviados para trigger YOLO: **${{ steps.capture.outputs.recent_jpg_count }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ -f nasa-capture.log ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -n 30 nasa-capture.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
