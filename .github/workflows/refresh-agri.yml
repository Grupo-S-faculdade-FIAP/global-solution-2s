name: Refresh Agri Data

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Anos INMET BDMEP (ex.: 2024 ou 2023 2024)"
        required: false
        default: "2024"

permissions:
  contents: write

concurrency:
  group: refresh-agri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: INMET + FAOSTAT + AgriRiskModel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Run agri pipeline
        run: |
          YEARS="${{ github.event.inputs.years }}"
          python scripts/build_agri_pipeline.py --years ${YEARS}

      - name: Commit updated models and FAOSTAT
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models/agri_risk_*.pkl docs/dados/FAOSTAT_BR_contexto.md data/references/faostat_brazil_qcl.json
          if git diff --staged --quiet; then
            echo "Nenhuma alteração para commitar."
            exit 0
          fi
          git commit -m "chore(agri): refresh INMET/FAOSTAT models [skip ci]"
          git push
