<div class="location-bar" id="location-bar">
  <div class="location-bar-header">
    <div class="location-bar-heading">
      <i class="bi bi-geo-alt-fill text-blue" aria-hidden="true"></i>
      <div>
        <p class="location-bar-title">Escolha sua região</p>
        <p class="location-bar-sub">Define o que aparece nos painéis abaixo</p>
      </div>
    </div>
    <div class="location-bar-badge" id="location-badge">
      <span class="location-city-name" id="location-city-name">São Paulo, SP</span>
      <span class="location-coords" id="location-label">—</span>
    </div>
    <button type="button" class="location-collapse-toggle" id="btn-location-collapse"
      aria-expanded="true" aria-controls="location-bar-body" title="Recolher painel de região">
      <i class="bi bi-chevron-up" aria-hidden="true"></i>
    </button>
  </div>
  <div class="location-bar-body" id="location-bar-body">
    <div class="location-bar-grid">
      <div class="location-field location-field-city">
        <label for="select-city">Cidade</label>
        <select id="select-city" aria-label="Cidade"></select>
      </div>
      <div class="location-picker-wrap">
        <label for="location-picker-map">Definir local no mapa</label>
        <div id="location-picker-map" role="application" aria-label="Clique no mapa para definir local"></div>
        <p class="location-bar-hint">Clique ou arraste o marcador — a região atualiza automaticamente</p>
      </div>
      <div class="location-actions">
        <button type="button" id="btn-geo" title="Usar localização do dispositivo">
          <i class="bi bi-geo-alt-fill" aria-hidden="true"></i> Minha posição
        </button>
        <button type="button" id="btn-reset-sp" title="Voltar para São Paulo (demo)">
          <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i> São Paulo
        </button>
        <button type="button" class="primary" id="btn-apply-location">Aplicar coordenadas</button>
      </div>
    </div>
    <details class="location-advanced" id="location-advanced">
      <summary>Avançado — latitude / longitude</summary>
      <div class="location-advanced-fields">
        <div>
          <label for="input-lat">Latitude</label>
          <input type="number" id="input-lat" step="0.0001" min="-90" max="90" value="-23.55" aria-label="Latitude">
        </div>
        <div>
          <label for="input-lon">Longitude</label>
          <input type="number" id="input-lon" step="0.0001" min="-180" max="180" value="-46.63" aria-label="Longitude">
        </div>
      </div>
    </details>
  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
